<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Changer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Voice Changer</h1>

  <div class="section">
    <h2>Input</h2>
    <select id="input-device"></select>
    <h2>Output</h2>
    <select id="output-device"></select>
  </div>

  <button class="btn-start" id="start-btn">Start</button>

  <div class="section">
    <h2>DSP Effects</h2>
    <div class="effects-grid">
      <button class="effect-btn" data-effect="pitch_up">Pitch Up<br><small>+5 semi</small></button>
      <button class="effect-btn" data-effect="pitch_down">Pitch Down<br><small>-5 semi</small></button>
      <button class="effect-btn" data-effect="robot">Robot</button>
      <button class="effect-btn" data-effect="echo">Echo</button>
      <button class="effect-btn" data-effect="reverb">Reverb</button>
      <button class="effect-btn" id="clear-btn">Clear All</button>
    </div>
    <div class="active-effects" id="active-effects"></div>
  </div>

  <div class="status-bar">
    <span id="status">Stopped</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
